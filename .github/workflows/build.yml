name: Build

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install adafruit-nrfutil
        # The Adafruit nRF52 build recipe shells out to adafruit-nrfutil to
        # package the DFU .zip; it is not bundled with the core on the runner.
        run: pip install adafruit-nrfutil

      - name: Install Adafruit nRF52 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core update-index
          arduino-cli core install adafruit:nrf52

      - name: Generate version header
        run: ./gen_version.sh

      - name: Compile OpenPuck
        run: |
          arduino-cli compile \
            -b adafruit:nrf52:feather52840 \
            --build-property "build.extra_flags=-DNRF52840_XXAA {build.flags.usb} -DCFG_TUD_HID=4" \
            OpenPuck

      - name: Copy build outputs before cleanup
        run: |
          # The Adafruit core stores outputs in a temp dir; copy them out
          # The env var ARDUINO_BUILD_OUTPUT_DIR points to the output dir
          OUTPUT_DIR="${ARDUINO_BUILD_OUTPUT_DIR:-.}"
          echo "ARDUINO_BUILD_OUTPUT_DIR=$OUTPUT_DIR"
          
          # List what we find in the output dir
          if [ -d "$OUTPUT_DIR" ]; then
            echo "Files in $OUTPUT_DIR:"
            ls -la "$OUTPUT_DIR"
            
            # Copy any binary/uf2/elf/zip files to build_outputs
            mkdir -p build_outputs
            find "$OUTPUT_DIR" -maxdepth 1 -type f \( -name "*.uf2" -o -name "*.bin" -o -name "*.elf" -o -name "*.zip" \) -print -exec cp {} "build_outputs/" \;
          fi
          
          echo "build_outputs contents:"
          ls -la build_outputs/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openpuck-firmware
          retention-days: 7
          path: |
            **/*.uf2
            **/*.bin
            **/*.elf
            **/*.zip
