name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install adafruit-nrfutil
        run: pip install adafruit-nrfutil

      - name: Install Adafruit nRF52 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls https://adafruit.github.io/arduino-board-index/package_adafruit_index.json
          arduino-cli core update-index
          arduino-cli core install adafruit:nrf52

      - name: Generate version header
        run: ./gen_version.sh

      - name: Compile OpenPuck
        run: |
          arduino-cli compile \
            -b adafruit:nrf52:feather52840 \
            --build-property "build.extra_flags=-DNRF52840_XXAA {build.flags.usb} -DCFG_TUD_HID=4" \
            OpenPuck

      - name: Compile recovery build
        run: |
          arduino-cli compile \
            -b adafruit:nrf52:feather52840 \
            --build-property "build.extra_flags=-DNRF52840_XXAA {build.flags.usb} -DCFG_TUD_HID=4 -DOPK_FACTORY_RESET=1" \
            OpenPuck

      - name: Collect artifacts
        run: |
          mkdir -p release_assets
          VERSION="${GITHUB_REF#refs/tags/}"
          # Standard build outputs from the default compile
          find . -path ./release_assets -prune -false -o \( -name '*.uf2' -o -name '*.bin' -o -name '*.elf' -o -name '*.zip' \) -print | while read -r f; do
            # Adafruit core puts outputs in a temp dir; names contain the board ID.
            base="$(basename "$f")"
            # Rename to include version tag for clarity
            case "$base" in
              *.uf2)  mv "$f" "release_assets/OpenPuck${VERSION//v/}_$base" ;;
              *.bin)  mv "$f" "release_assets/OpenPuck${VERSION//v/}_$base" ;;
              *.elf)  mv "$f" "release_assets/OpenPuck${VERSION//v/}_$base" ;;
              *.zip)  mv "$f" "release_assets/OpenPuck${VERSION//v/}_DFU_$base" ;;
            esac
          done

      - name: Upload release assets
        run: |
          cd release_assets
          # Upload all collected artifacts as the release asset
          # These will be attached to the GitHub Release automatically
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          body: |
            OpenPuck Firmware Release
            
            Build: ${{ github.sha }}
            Tag: ${{ github.ref_name }}
            
            ### Files included:
            ###
            - `.uf2` files for direct DFU flashing
            - `.bin` files for manual flashing via bootloader
            - `.elf` files for debugging with GDB/JTAG
            - `.zip` files for Adafruit DFU tool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}